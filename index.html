<!DOCTYPE html>
<html>
<head>
  <title>Sports and Education Centre - ASA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #418EDE, #E55527);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card {
      background:white;
      padding:25px;
      border-radius:15px;
      width:350px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2 {
      color:#418EDE;
      margin-bottom:20px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:14px;
    }

    video {
      width:100%;
      border-radius:10px;
      margin-top:10px;
      border:3px solid #418EDE;
    }

    .btn {
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .clockin {
      background:#418EDE;
      color:white;
    }

    .clockin:hover { background:#2f6fb8; }

    .clockout {
      background:#E55527;
      color:white;
    }

    .clockout:hover { background:#c7431b; }

    .footer {
      margin-top:15px;
      font-size:12px;
      color:#777;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Sports & Education Centre - ASA</h2>

  <input type="text" id="name" placeholder="Employee Name">

  <select id="area">
    <option>Atmakur</option>
    <option>Bathalapalli</option>
    <option>Dharmavaram</option>
    <option>Anantapur</option>
  </select>

  <video id="video" autoplay playsinline></video>

  <button class="btn clockin" onclick="clock('Clock In')">Clock In</button>
  <button class="btn clockout" onclick="clock('Clock Out')">Clock Out</button>

  <div class="footer">
    SEC-ASA Attendance System
  </div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec"; // keep your deployed URL

// Start Camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => { document.getElementById('video').srcObject = stream; })
.catch(() => alert("Camera permission required"));

function getLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      () => reject("Location permission required"),
      { enableHighAccuracy:true }
    );
  });
}

async function clock(type) {

  const name = document.getElementById("name").value;
  const area = document.getElementById("area").value;

  if(!name) { alert("Enter employee name"); return; }

  let location;
  try {
    location = await getLocation();
  } catch {
    alert("Location permission required");
    return;
  }

  const video = document.getElementById("video");
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");

  ctx.drawImage(video,0,0);

  // ---- GPS WATERMARK ----
  const now = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });

  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, canvas.height - 140, canvas.width, 140);

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Sports & Education Centre - ASA", 20, canvas.height - 100);
  ctx.fillText("Lat: " + location.lat.toFixed(6), 20, canvas.height - 70);
  ctx.fillText("Lng: " + location.lng.toFixed(6), 20, canvas.height - 40);
  ctx.fillText("Time: " + now, 20, canvas.height - 10);
  ctx.fillText("Type: " + type, canvas.width - 250, canvas.height - 10);
  // ------------------------

  const photo = canvas.toDataURL("image/jpeg", 0.8).split(',')[1];

  fetch(scriptURL,{
    method:"POST",
    body: JSON.stringify({
      name,
      area,
      type,
      lat: location.lat,
      lng: location.lng,
      photo
    })
  })
  .then(res=>res.text())
  .then(data=>alert(data))
  .catch(()=>alert("Error submitting"));
}

</script>

</body>
</html>
