<!DOCTYPE html>
<html>
<head>
  <title>Sports and Education Centre - ASA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
      padding: 20px;
    }

    h2 {
      color: #418EDE;
    }

    input, select {
      padding: 10px;
      margin: 8px;
      width: 90%;
      max-width: 320px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 6px;
      background: #E55527;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 320px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Sports and Education Centre - ASA</h2>

<input type="text" id="name" placeholder="Employee Name">
<br>

<input type="text" id="empId" placeholder="Employee ID">
<br>

<select id="area">
  <option>Atmakur</option>
  <option>Bathalapalli</option>
  <option>Dharmavaram</option>
  <option>Anantapur</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="clock('Clock In')">Clock In</button>
<button onclick="clock('Clock Out')">Clock Out</button>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec";

// Start Camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  document.getElementById('video').srcObject = stream;
})
.catch(err => alert("Camera permission required"));

function getLocation() {
  return new Promise((resolve, reject) => {

    if (!navigator.geolocation) {
      alert("Geolocation not supported");
      reject();
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => {
        resolve({
          lat: position.coords.latitude,
          lng: position.coords.longitude
        });
      },
      error => {
        alert("GPS permission required");
        reject();
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );
  });
}

async function clock(type) {

  const name = document.getElementById("name").value;
  const empId = document.getElementById("empId").value;
  const area = document.getElementById("area").value;

  if (!name || !empId) {
    alert("Please enter name and Employee ID");
    return;
  }

  let location = { lat: "", lng: "" };

  try {
    location = await getLocation();
  } catch (err) {
    return;
  }

  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  const photo = canvas.toDataURL("image/jpeg").split(',')[1];

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({
      name,
      empId,
      area,
      type,
      lat: location.lat,
      lng: location.lng,
      photo
    })
  })
  .then(res => res.text())
  .then(data => alert(data))
  .catch(err => alert("Error submitting attendance"));
}

</script>

</body>
</html>
