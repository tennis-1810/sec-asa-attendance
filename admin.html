<!DOCTYPE html>
<html>
<head>
  <title>SEC-ASA Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#418EDE,#E55527);
      min-height:100vh;
    }

    .container {
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:white;
      border-radius:10px;
      padding:15px;
      margin-bottom:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.15);
    }

    .header {
      font-size:20px;
      font-weight:bold;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button {
      background:#418EDE;
      color:white;
      border:none;
      padding:6px 12px;
      border-radius:5px;
      cursor:pointer;
    }

    button.secondary {
      background:#E55527;
    }

    input, select {
      padding:6px;
      margin-right:5px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      padding:8px;
      border:1px solid #ddd;
      text-align:center;
    }

    th {
      background:#418EDE;
      color:white;
    }

    .summary {
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .summary-box {
      flex:1;
      min-width:200px;
      background:#418EDE;
      color:white;
      padding:15px;
      border-radius:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card header">
    Sports and Education Centre - ASA (Admin Panel)
    <button class="secondary" onclick="logout()">Logout</button>
  </div>

  <div class="summary">
    <div class="summary-box">
      <h3 id="todayCount">0</h3>
      Today Present
    </div>
    <div class="summary-box">
      <h3 id="totalCount">0</h3>
      Total Entries
    </div>
  </div>

  <div class="card">
    <input type="date" id="dateFilter">
    <input type="month" id="monthFilter">

    <select id="areaFilter">
      <option value="">All Areas</option>
      <option>Atmakur</option>
      <option>Bathalapalli</option>
      <option>Dharmavaram</option>
      <option>Anantapur</option>
    </select>

    <input type="text" id="searchID" placeholder="Search Employee ID">

    <button onclick="loadData()">Filter</button>
    <button class="secondary" onclick="exportPDF()">Export PDF</button>
  </div>

  <div class="card">
    <table id="attendanceTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Employee ID</th>
          <th>Area</th>
          <th>Time</th>
          <th>Latitude</th>
          <th>Longitude</th>
          <th>Photo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
/* 🔐 ADMIN PROTECTION */
if(localStorage.getItem("adminLoggedIn") !== "true"){
  window.location.href = "admin-login.html";
}

/* 🔓 LOGOUT */
function logout(){
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "admin-login.html";
}

/* 🔄 LOAD DATA */
function loadData(){

  fetch("https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec")
  .then(res => res.json())
  .then(data => {

    const tableBody = document.querySelector("#attendanceTable tbody");
    tableBody.innerHTML = "";

    let today = new Date().toISOString().split("T")[0];
    let todayCount = 0;

    data.forEach(row => {

      let date = row.date;
      let emp = row.employeeId;
      let area = row.area;
      let time = row.time;
      let lat = row.latitude;
      let lng = row.longitude;
      let photo = row.photo;

      let dateFilter = document.getElementById("dateFilter").value;
      let monthFilter = document.getElementById("monthFilter").value;
      let areaFilter = document.getElementById("areaFilter").value;
      let searchID = document.getElementById("searchID").value;

      if(dateFilter && date !== dateFilter) return;
      if(monthFilter && !date.startsWith(monthFilter)) return;
      if(areaFilter && area !== areaFilter) return;
      if(searchID && emp !== searchID) return;

      if(date === today) todayCount++;

      tableBody.innerHTML += `
        <tr>
          <td>${date}</td>
          <td>${emp}</td>
          <td>${area}</td>
          <td>${time}</td>
          <td>${lat}</td>
          <td>${lng}</td>
          <td><a href="${photo}" target="_blank">View</a></td>
        </tr>
      `;
    });

    document.getElementById("todayCount").innerText = todayCount;
    document.getElementById("totalCount").innerText = data.length;

  });
}

/* 📄 EXPORT PDF */
function exportPDF(){
  window.print();
}

/* LOAD ON START */
loadData();

</script>

</body>
</html>
