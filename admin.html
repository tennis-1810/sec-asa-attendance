<!DOCTYPE html>
<html>
<head>
  <title>SEC-ASA Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#418EDE,#E55527);
    }

    .container {
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .header {
      background:white;
      padding:15px 20px;
      border-radius:10px;
      font-size:20px;
      font-weight:bold;
      color:#418EDE;
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .logoutBtn {
      background:#E55527;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:5px;
      cursor:pointer;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    .summary {
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    .summary .card {
      flex:1;
      text-align:center;
      font-size:18px;
      font-weight:bold;
      color:#418EDE;
    }

    input, select {
      padding:6px;
      margin:5px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    button {
      background:#418EDE;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:5px;
      cursor:pointer;
      margin:5px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    table th, table td {
      border:1px solid #ddd;
      padding:8px;
      text-align:center;
      font-size:14px;
    }

    table th {
      background:#418EDE;
      color:white;
    }

    .filters {
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:5px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    Sports and Education Centre - ASA (Admin Dashboard)
    <button class="logoutBtn" onclick="logout()">Logout</button>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="summary">
    <div class="card">
      Today Present<br>
      <span id="todayCount">0</span>
    </div>
    <div class="card">
      Total Entries<br>
      <span id="totalCount">0</span>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="card">
    <div class="filters">
      <input type="date" id="dateFilter">
      <input type="month" id="monthFilter">
      
      <select id="areaFilter">
        <option value="">All Areas</option>
        <option>Atmakur</option>
        <option>Bathalapalli</option>
        <option>Dharmavaram</option>
        <option>Anantapur</option>
      </select>

      <input type="text" id="searchID" placeholder="Search Employee ID">

      <button onclick="applyFilters()">Filter</button>
      <button onclick="exportPDF()">Export PDF</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <table id="attendanceTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>ID</th>
          <th>Area</th>
          <th>Latitude</th>
          <th>Longitude</th>
          <th>Photo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec";

let fullData = [];

function logout(){
  window.location.href = "admin-login.html";
}

function loadData(){
  fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    fullData = data;
    document.getElementById("totalCount").innerText = data.length;

    const today = new Date().toISOString().split("T")[0];
    const todayEntries = data.filter(row => row.date.includes(today));
    document.getElementById("todayCount").innerText = todayEntries.length;

    renderTable(data);
  });
}

function renderTable(data){
  const tbody = document.querySelector("#attendanceTable tbody");
  tbody.innerHTML = "";

  data.forEach(row=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.date}</td>
      <td>${row.name}</td>
      <td>${row.id}</td>
      <td>${row.area}</td>
      <td>${row.latitude}</td>
      <td>${row.longitude}</td>
      <td><a href="${row.photo}" target="_blank">View</a></td>
    `;
    tbody.appendChild(tr);
  });
}

function applyFilters(){
  let filtered = fullData;

  const date = document.getElementById("dateFilter").value;
  const month = document.getElementById("monthFilter").value;
  const area = document.getElementById("areaFilter").value;
  const empID = document.getElementById("searchID").value.toLowerCase();

  if(date){
    filtered = filtered.filter(row => row.date.includes(date));
  }

  if(month){
    filtered = filtered.filter(row => row.date.includes(month));
  }

  if(area){
    filtered = filtered.filter(row => row.area === area);
  }

  if(empID){
    filtered = filtered.filter(row => row.id.toLowerCase().includes(empID));
  }

  renderTable(filtered);
}

function exportPDF(){
  window.print();
}

loadData();

</script>

</body>
</html>
