<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SEC-ASA Admin Panel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background: linear-gradient(135deg,#E55527,#1E3A8A);
  color:white;
}

.card {
  background:white;
  color:#333;
  padding:25px;
  border-radius:10px;
  width:320px;
  margin:auto;
  margin-top:100px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

input, select {
  width:100%;
  padding:8px;
  margin:8px 0;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

.login-btn {
  background:#E55527;
  color:white;
  width:100%;
}

.header {
  padding:15px;
  background:#fff;
  color:#E55527;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.dashboard {
  display:none;
  padding:20px;
}

.summary {
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.summary-card {
  background:white;
  color:#333;
  padding:15px;
  border-radius:10px;
  flex:1;
  text-align:center;
}

table {
  width:100%;
  background:white;
  color:black;
  border-collapse:collapse;
}

th, td {
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
}

th {
  background:#E55527;
  color:white;
}

.filter-bar {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
  <h2 style="text-align:center;">SEC-ASA Admin Login</h2>
  <input type="text" id="username" placeholder="Admin ID">
  <input type="password" id="password" placeholder="Password">
  <button class="login-btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="header">
    <div>Sports & Education Centre - ASA | Admin Dashboard</div>
    <button onclick="logout()" style="background:#E55527;color:white;">Logout</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="summary-card">
      <h3 id="todayCount">0</h3>
      <p>Today Present</p>
    </div>
    <div class="summary-card">
      <h3 id="totalCount">0</h3>
      <p>Total Entries</p>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar">
    <input type="date" id="dateFilter" onchange="applyFilters()">
    <input type="month" id="monthFilter" onchange="applyFilters()">
    <select id="areaFilter" onchange="applyFilters()">
      <option value="">All Areas</option>
      <option>Atmakur</option>
      <option>Bathalapalli</option>
      <option>Dharmavaram</option>
      <option>Anantapur</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search Employee ID" onkeyup="applyFilters()">
    <button onclick="exportPDF()">Export PDF</button>
  </div>

  <!-- TABLE -->
  <table id="dataTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Employee ID</th>
        <th>Name</th>
        <th>Area</th>
        <th>Type</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
const ADMIN_ID = "admin";
const ADMIN_PASS = "1234";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec";

let allData = [];

function login() {
  if (
    document.getElementById("username").value === ADMIN_ID &&
    document.getElementById("password").value === ADMIN_PASS
  ) {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    alert("Invalid Credentials");
  }
}

function logout() {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("loginCard").style.display = "block";
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
}

async function loadData() {
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();
  allData = data.reverse();
  renderTable(allData);
}

function renderTable(data) {
  const tbody = document.querySelector("#dataTable tbody");
  tbody.innerHTML = "";

  let today = new Date().toISOString().split("T")[0];
  let todayCount = 0;

  data.forEach(row => {
    const tr = document.createElement("tr");
    row.forEach(cell => {
      const td = document.createElement("td");
      td.textContent = cell;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);

    if (row[0] === today) todayCount++;
  });

  document.getElementById("todayCount").innerText = todayCount;
  document.getElementById("totalCount").innerText = data.length;
}

function applyFilters() {
  let date = document.getElementById("dateFilter").value;
  let month = document.getElementById("monthFilter").value;
  let area = document.getElementById("areaFilter").value;
  let search = document.getElementById("searchInput").value.toLowerCase();

  let filtered = allData.filter(row => {

    let match = true;

    if (date && row[0] !== date) match = false;

    if (month && !row[0].startsWith(month)) match = false;

    if (area && row[3] !== area) match = false;

    if (search && !row[1].toLowerCase().includes(search)) match = false;

    return match;
  });

  renderTable(filtered);
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let rows = document.querySelectorAll("#dataTable tbody tr");
  let y = 10;

  doc.text("SEC-ASA Attendance Report", 10, y);
  y += 10;

  rows.forEach(row => {
    let rowText = "";
    row.querySelectorAll("td").forEach(td => {
      rowText += td.innerText + " | ";
    });
    doc.text(rowText, 10, y);
    y += 8;
  });

  doc.save("Attendance_Report.pdf");
}
</script>

</body>
</html>
