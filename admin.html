<!DOCTYPE html>
<html>
<head>
  <title>SEC-ASA Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#418EDE,#E55527);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:white;
      padding:30px;
      border-radius:15px;
      width:350px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      text-align:center;
    }

    h2 { color:#418EDE; }

    input {
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button {
      padding:10px 15px;
      background:#E55527;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      margin:5px;
    }

    button:hover { opacity:0.9; }

    .dashboard {
      display:none;
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#f4f6f9;
      padding:20px;
      overflow:auto;
    }

    .header {
      background:linear-gradient(90deg,#418EDE,#E55527);
      color:white;
      padding:15px;
      font-size:20px;
      font-weight:bold;
      border-radius:10px;
      margin-bottom:20px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    th {
      background:#418EDE;
      color:white;
      padding:10px;
    }

    td {
      padding:8px;
      border-bottom:1px solid #ddd;
      text-align:center;
      font-size:13px;
    }

    img {
      width:50px;
      border-radius:5px;
    }

    .summary {
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .cardBox {
      background:#418EDE;
      color:white;
      padding:15px;
      border-radius:10px;
      min-width:150px;
    }

    .cardBox.orange {
      background:#E55527;
    }

  </style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <h2>SEC-ASA Admin Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="header">
    Sports & Education Centre - ASA | Admin Dashboard
  </div>

  <!-- SUMMARY CARDS -->
  <div class="summary">
    <div class="cardBox">
      <div>Today Present</div>
      <div id="todayCount" style="font-size:22px;font-weight:bold;">0</div>
    </div>

    <div class="cardBox orange">
      <div>Total Entries</div>
      <div id="totalCount" style="font-size:22px;font-weight:bold;">0</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div style="margin-bottom:15px;display:flex;gap:10px;flex-wrap:wrap;">
    <input type="date" id="dateFilter">
    <input type="month" id="monthFilter">
    <input type="text" id="searchId" placeholder="Search Employee ID">
    <button onclick="applyFilters()">Apply</button>
    <button onclick="exportPDF()">Export PDF</button>
    <button onclick="loadData()">Refresh</button>
  </div>

  <!-- TABLE -->
  <table id="attendanceTable">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Name</th>
        <th>ID</th>
        <th>Area</th>
        <th>Type</th>
        <th>Lat</th>
        <th>Lng</th>
        <th>Photo</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec";
let allData = [];

// LOGIN
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(user === "SEC-ASA" && pass === "123456789") {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadData();
  } else {
    alert("Invalid Credentials");
  }
}

// LOAD DATA
function loadData() {
  fetch(scriptURL)
  .then(res=>res.json())
  .then(data=>{
    allData = data;
    renderTable(allData);
    updateSummary(allData);
  });
}

// RENDER TABLE
function renderTable(data){
  const body=document.getElementById("tableBody");
  body.innerHTML="";
  
  data.slice().reverse().forEach(row=>{
    const tr=document.createElement("tr");
    row.forEach((cell,i)=>{
      const td=document.createElement("td");
      if(i===7 && cell){
        td.innerHTML=`<a href="${cell}" target="_blank"><img src="${cell}"></a>`;
      } else {
        td.textContent=cell;
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });
}

// SUMMARY
function updateSummary(data){

  document.getElementById("totalCount").innerText = data.length;

  const today = new Date().toLocaleDateString('en-GB');

  const todayEntries = data.filter(row=>{
    return row[0] && row[0].includes(today);
  });

  document.getElementById("todayCount").innerText = todayEntries.length;
}

// FILTERS
function applyFilters(){

  const dateVal = document.getElementById("dateFilter").value;
  const monthVal = document.getElementById("monthFilter").value;
  const searchVal = document.getElementById("searchId").value.toLowerCase();

  let filtered = allData;

  if(dateVal){
    const formatted = dateVal.split("-").reverse().join("-");
    filtered = filtered.filter(row=> row[0].includes(formatted));
  }

  if(monthVal){
    const [year,month] = monthVal.split("-");
    filtered = filtered.filter(row=> row[0].includes(month+"-"+year));
  }

  if(searchVal){
    filtered = filtered.filter(row=> row[2].toLowerCase().includes(searchVal));
  }

  renderTable(filtered);
  updateSummary(filtered);
}

// PDF EXPORT
function exportPDF(){

  let content = "SEC-ASA Monthly Attendance Report\n\n";

  const rows = document.querySelectorAll("#attendanceTable tr");

  rows.forEach(row=>{
    const cols = row.querySelectorAll("td, th");
    let rowData = [];
    cols.forEach(col=> rowData.push(col.innerText));
    content += rowData.join(" | ") + "\n";
  });

  const blob = new Blob([content], { type: "application/pdf" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "SEC_ASA_Attendance_Report.pdf";
  link.click();
}

</script>

</body>
</html>
