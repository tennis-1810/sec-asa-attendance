<!DOCTYPE html>
<html>
<head>
  <title>SEC-ASA Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin:0;
      font-family:Segoe UI;
      background:#f4f6f9;
    }

    .header {
      background:linear-gradient(90deg,#418EDE,#E55527);
      padding:20px;
      color:white;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .container {
      padding:20px;
    }

    button {
      padding:10px 15px;
      background:#E55527;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
      margin-bottom:15px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    th {
      background:#418EDE;
      color:white;
      padding:10px;
    }

    td {
      padding:8px;
      text-align:center;
      border-bottom:1px solid #ddd;
    }

    img {
      width:50px;
      border-radius:5px;
    }
  </style>
</head>

<body>

<div class="header">
  Sports & Education Centre - ASA | Admin Dashboard
</div>

<div class="container">

  <button onclick="loadData()">Refresh Data</button>

  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Name</th>
        <th>ID</th>
        <th>Area</th>
        <th>Type</th>
        <th>Lat</th>
        <th>Lng</th>
        <th>Photo</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbz9eODq2buLCJO7Fo8X4z450KE2U5WA2cwauh0K3zEDi5hsuQV3omfZC2-_ue-EHIeMvQ/exec";

function loadData() {
  fetch(scriptURL)
  .then(res=>res.json())
  .then(data=>{
    const body=document.getElementById("tableBody");
    body.innerHTML="";
    data.reverse().forEach(row=>{
      const tr=document.createElement("tr");
      row.forEach((cell,i)=>{
        const td=document.createElement("td");
        if(i===7 && cell){
          td.innerHTML=`<a href="${cell}" target="_blank"><img src="${cell}"></a>`;
        } else {
          td.textContent=cell;
        }
        tr.appendChild(td);
      });
      body.appendChild(tr);
    });
  });
}
</script>

</body>
</html>
